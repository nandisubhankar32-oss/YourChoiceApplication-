<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Your Choice Application</title>
<style>
:root{--p:#1976d2;--r:#d32f2f;--g:#388e3c;--o:#f57c00;--bg:#f0f2f5}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-size:15px}
.hide{display:none!important}
.header{background:var(--p);color:#fff;padding:14px;text-align:center;font-size:18px;font-weight:700;position:sticky;top:0;z-index:100}
.scroll-tag{background:var(--r);color:#fff;padding:8px;overflow:hidden;white-space:nowrap}
.scroll-tag span{display:inline-block;animation:scroll 18s linear infinite;padding-left:100%}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.nav{display:flex;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.1);position:sticky;top:52px;z-index:99}
.nav-btn{flex:1;padding:13px 4px;border:none;background:#fff;border-bottom:3px solid transparent;cursor:pointer;font-weight:600;font-size:12px}
.nav-btn.active{border-bottom:3px solid var(--p);color:var(--p)}
.tab-content{padding:12px;max-width:900px;margin:auto}
.btn{padding:12px 16px;margin:4px 2px;background:var(--p);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.btn:active{transform:scale(.97)}
.btn-red{background:var(--r)}.btn-green{background:var(--g)}.btn-orange{background:var(--o)}.btn-gray{background:#757575}
.card{background:#fff;padding:16px;margin:10px 0;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
input,textarea,select{width:100%;padding:12px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none}
input:focus,textarea:focus{border-color:var(--p)}
textarea{resize:vertical;min-height:90px}
label{font-weight:600;font-size:14px;margin-top:10px;display:block}
.line-item{display:flex;align-items:center;padding:10px;border-bottom:1px solid #eee;gap:10px}
.line-item span{flex:1;white-space:pre-wrap;word-break:break-word}
.del-line{color:var(--r);cursor:pointer;font-size:24px;line-height:1;padding:0 5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;padding:15px}
.modal-content{background:#fff;padding:20px;border-radius:14px;width:100%;max-width:650px;max-height:90vh;overflow:auto}
.badge{background:var(--r);color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;margin-left:5px}
.flex{display:flex;gap:8px;flex-wrap:wrap}.flex-col{display:flex;flex-direction:column;gap:8px}
.small{font-size:12px;color:#666}.center{text-align:center}
hr{border:none;border-top:1px solid #eee;margin:14px 0}
.radio-group label{font-weight:400;display:flex;align-items:center;gap:8px;margin:5px 0}
.radio-group input{width:auto}
.toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:12px 22px;border-radius:25px;z-index:1000;font-size:14px}
</style>
</head>
<body>
<div class="header">🌟 Your Choice Application</div>
<div class="scroll-tag" id="scrollTag"><span>Welcome to Your Choice Application</span></div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('main',this)">🏠 Main</button>
  <button class="nav-btn" onclick="showTab('tools',this)">🛠️ Tools</button>
  <button class="nav-btn" onclick="showTab('listpad',this)">📋 List Pad</button>
  <button class="nav-btn" onclick="showTab('office',this)">🏢 Office Room</button>
</div>

<!-- MAIN -->
<div id="main" class="tab-content">
  <div class="card">
    <div class="flex">
      <button class="btn" onclick="showEvent()">📅 A. Event</button>
      <button class="btn" onclick="showApplication()">📝 B. Application</button>
      <button class="btn" onclick="showLinks()">🔗 C. Link</button>
      <button class="btn" onclick="showNotice()">📢 D. Notice Board</button>
    </div>
  </div>
  <div class="card" id="userArea">
    <label>E. User Name / Office Access</label>
    <input type="text" id="username" placeholder="Enter your name..." onkeypress="if(event.key==='Enter')loginUser()">
    <button class="btn btn-green" onclick="loginUser()">Enter ➤</button>
  </div>
  <button class="btn btn-red hide" id="logoutBtn" onclick="logout()">🚪 Log Out</button>
  <div id="mainContent"></div>
</div>

<!-- TOOLS -->
<div id="tools" class="tab-content hide">
  <h3>🛠️ Offline Tools</h3>
  <p class="small">একবার লোড হলে নেট ছাড়াও চলবে</p>
  <div id="toolsContainer"></div>
</div>

<!-- LIST PAD -->
<div id="listpad" class="tab-content hide">
  <div id="listpadLock" class="card center">🔒 Only Office Room members can access</div>
  <div id="listpadContent" class="hide">
    <input type="text" id="searchPage" placeholder="🔍 Search page title..." onkeyup="filterPages()">
    <input type="text" id="searchLine" placeholder="🔍 Search line in all pages..." onkeyup="searchAllLines()">
    <button class="btn btn-green" onclick="newPage()">➕ New Page</button>
    <div id="pagesContainer"></div>
  </div>
</div>

<!-- OFFICE ROOM -->
<div id="office" class="tab-content hide">
  <div id="officeLock" class="card center">🔒 Enter Office Access Code in Main tab</div>
  <div id="officeContent" class="hide">
    <div class="flex">
      <button class="btn" onclick="addToolModal()">🛠️ Add Tools</button>
      <button class="btn" onclick="addAppFormModal()">📝 Add Application</button>
      <button class="btn" onclick="addLinkModal()">🔗 Add Link</button>
      <button class="btn" onclick="addScrollTagModal()">📜 Add Scroll Tag</button>
      <button class="btn" onclick="addNoticeModal()">📢 Add Notice</button>
      <button class="btn" onclick="addEventModal()">📅 Add Event</button>
      <button class="btn btn-orange" onclick="showReceivedApp()">📥 Receive Application<span id="appBadge" class="badge hide">0</span></button>
    </div>
    <div id="officeData"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hide" onclick="if(event.target==this)closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, deleteDoc, query, where, orderBy, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVNKYEONsmJQYvNQZLrsDFjWRIFS9Iupk",
  authDomain: "your-choice-application-3f40a.firebaseapp.com",
  projectId: "your-choice-application-3f40a",
  storageBucket: "your-choice-application-3f40a.firebasestorage.app",
  messagingSenderId: "149984268715",
  appId: "1:149984268715:web:669e5fe20dcf5bce5c82ee",
  measurementId: "G-DPFE88RN21"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isOfficeMember = localStorage.getItem('isOfficeMember') === 'true';
let listPages = JSON.parse(localStorage.getItem('listPages') || '{}');

// INIT
window.onload = async () => {
  checkLoginStatus();
  loadScrollTag();
  loadTools();
  registerSW();
  autoDeleteExpired();
  checkUrlParams();
  setInterval(autoDeleteExpired, 1800000);
  if(isOfficeMember) listenApplications();
};

function checkLoginStatus() {
  if(isOfficeMember) {
    document.getElementById('userArea').classList.add('hide');
    document.getElementById('logoutBtn').classList.remove('hide');
    document.getElementById('officeLock').classList.add('hide');
    document.getElementById('officeContent').classList.remove('hide');
    document.getElementById('listpadLock').classList.add('hide');
    document.getElementById('listpadContent').classList.remove('hide');
    renderPages();
  }
}

window.loginUser = async () => {
  const name = document.getElementById('username').value.trim();
  if(!name) return showToast('❌ Enter name');
  try {
    const secretDoc = await getDoc(doc(db, "settings", "officeKey"));
    const officeKey = secretDoc.exists()? secretDoc.data().key : '';
    if(name === officeKey && officeKey!== '') {
      isOfficeMember = true;
      localStorage.setItem('isOfficeMember', 'true');
      checkLoginStatus();
      listenApplications();
      showToast('✅ Office Room Unlocked');
    } else {
      showToast('👋 Welcome');
      document.getElementById('username').value = '';
    }
  } catch(e) { showToast('❌ Network Error'); }
};

window.logout = () => {
  isOfficeMember = false;
  localStorage.removeItem('isOfficeMember');
  location.reload();
};

window.showTab = (tab, btn) => {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hide'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.remove('hide');
  if(btn) btn.classList.add('active');
};

// MAIN FUNCTIONS
window.showEvent = async () => {
  const q = query(collection(db, "events"), orderBy("created", "desc"));
  const snap = await getDocs(q);
  let html = '<h3>📅 Events</h3>';
  snap.forEach(d => {
    const e = d.data();
    const shareLink = location.origin + location.pathname + '?event=' + d.id;
    html += `<div class="card"><b>${e.title}</b><br><span class="small">Last Date: ${e.lastDate}</span><br>${nl2br(e.desc)}<br>
    <button class="btn btn-gray" onclick="navigator.clipboard.writeText('${shareLink}');showToast('🔗 Link Copied')">🔗 Copy Link</button>
    ${isOfficeMember?`<button class="btn btn-red" onclick="delDoc('events','${d.id}');showEvent()">🗑️ Delete</button>`:''}</div>`;
  });
  document.getElementById('mainContent').innerHTML = html || '<div class="card">No Events</div>';
};

window.showApplication = async () => {
  const snap = await getDocs(collection(db, "appForms"));
  let html = '<h3>📝 Available Applications</h3><div class="flex-col">';
  snap.forEach(d => {
    html += `<button class="btn" onclick="fillForm('${d.id}')">${d.data().title}</button>`;
  });
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html || '<div class="card">No Forms Available</div>';
};

window.fillForm = async (formId) => {
  const d = await getDoc(doc(db, "appForms", formId));
  const f = d.data();
  let html = `<h3>${f.title}</h3><form id="userForm"><div class="flex-col">`;
  f.fields.forEach((field, i) => {
    if(field.type === 'text') {
      html += `<label>${field.label}</label><input name="f${i}" required>`;
    } else if(field.type === 'radio') {
      html += `<label>${field.label}</label><div class="radio-group">`;
      field.options.forEach(opt => {
        html += `<label><input type="radio" name="f${i}" value="${opt}" required> ${opt}</label>`;
      });
      html += `</div>`;
    } else if(field.type === 'office') {
      html += `<label>${field.label}: ${field.value}</label><input type="hidden" name="f${i}" value="${field.value}">`;
    } else if(field.type === 'textarea') {
      html += `<label>${field.label} (Optional)</label><textarea name="f${i}"></textarea>`;
    }
  });
  html += `</div><button type="submit" class="btn btn-green">📤 Send</button></form>`;
  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('userForm').onsubmit = async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    await addDoc(collection(db, "receivedApps"), {
      formId, formTitle: f.title, data,
      submittedAt: Timestamp.now(),
      expireAt: Timestamp.fromDate(new Date(Date.now() + 100*24*60*60*1000))
    });
    showToast('✅ Application Sent to Office Room');
    document.getElementById('mainContent').innerHTML = '';
  };
};

window.showLinks = async () => {
  const snap = await getDocs(collection(db, "links"));
  let html = '<h3>🔗 Links</h3><div class="flex-col">';
  snap.forEach(d => {
    const l = d.data();
    html += `<a href="${l.url}" target="_blank" class="btn">${l.title}</a>
    ${isOfficeMember?`<button class="btn btn-red" onclick="delDoc('links','${d.id}');showLinks()">🗑️</button>`:''}`;
  });
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html || '<div class="card">No Links</div>';
};

window.showNotice = async () => {
  const d = await getDoc(doc(db, "settings", "notice"));
  const notice = d.exists()? d.data().text : 'No Notice Available';
  document.getElementById('mainContent').innerHTML = `<div class="card"><h3>📢 Notice Board</h3>${nl2br(notice)}</div>`;
};

// TOOLS
async function loadTools() {
  const snap = await getDocs(collection(db, "tools"));
  let html = '';
  snap.forEach(d => {
    const t = d.data();
    localStorage.setItem('tool_'+d.id, t.code);
    html += `<div class="card"><b>${t.name}</b><div class="flex">
      <button class="btn" onclick="runTool('${d.id}')">▶️ Run</button>
      ${isOfficeMember?`<button class="btn btn-red" onclick="delDoc('tools','${d.id}');localStorage.removeItem('tool_${d.id}');loadTools()">🗑️ Delete</button>`:''}
    </div></div>`;
  });
  document.getElementById('toolsContainer').innerHTML = html || '<div class="card">No Tools Added</div>';
}

window.runTool = (id) => {
  const code = localStorage.getItem('tool_'+id);
  const win = window.open('', '_blank');
  win.document.open(); win.document.write(code); win.document.close();
};

// OFFICE ROOM MODALS
window.addToolModal = () => {
  showModal(`<h3>🛠️ Add Offline Tool</h3>
    <label>Tool Name</label><input id="toolName" placeholder="Calculator">
    <label>Full HTML/JS Code (Max 5000 lines)</label>
    <textarea id="toolCode" rows="12" placeholder="<!DOCTYPE html>..."></textarea>
    <div class="flex"><button class="btn btn-green" onclick="saveTool()">💾 Save Tool</button>
    <button class="btn btn-red" onclick="closeModal()">Cancel</button></div>`);
};

window.saveTool = async () => {
  const name = document.getElementById('toolName').value.trim();
  const code = document.getElementById('toolCode').value;
  if(!name ||!code) return showToast('❌ Fill all fields');
  if(code.split('\n').length > 5000) return showToast('❌ Max 5000 lines allowed');
  await addDoc(collection(db, "tools"), {name, code, created: Timestamp.now()});
  closeModal(); loadTools(); showToast('✅ Tool Saved');
};

window.addAppFormModal = () => {
  showModal(`<h3>📝 Create Application Form</h3>
    <label>Form Title</label><input id="formTitle">
    <label>Fields JSON</label>
    <textarea id="formFields" rows="8" placeholder='[{"type":"text","label":"Name"},{"type":"radio","label":"Gender","options":["Male","Female"]},{"type":"office","label":"Form No","value":"2X2"},{"type":"textarea","label":"Message"}]'></textarea>
    <label>Auto Delete After (Days)</label><input type="number" id="formExpiry" value="30">
    <div class="flex"><button class="btn btn-green" onclick="saveForm()">💾 Save Form</button>
    <button class="btn btn-red" onclick="closeModal()">Cancel</button></div>`);
};

window.saveForm = async () => {
  try {
    const title = document.getElementById('formTitle').value.trim();
    const fields = JSON.parse(document.getElementById('formFields').value);
    const expiry = parseInt(document.getElementById('formExpiry').value) || 30;
    await addDoc(collection(db, "appForms"), {title, fields, expiryDays: expiry, created: Timestamp.now()});
    closeModal(); showToast('✅ Form Created');
  } catch(e) { showToast('❌ Invalid JSON Format'); }
};

window.addLinkModal = () => {
  showModal(`<h3>🔗 Add Link</h3>
    <label>Title</label><input id="linkTitle">
    <label>URL</label><input id="linkUrl" type="url" placeholder="https://">
    <div class="flex"><button class="btn btn-green" onclick="saveLink()">💾 Save</button>
    <button class="btn btn-red" onclick="closeModal()">Cancel</button></div>`);
};

window.saveLink = async () => {
  const title = document.getElementById('linkTitle').value.trim();
  const url = document.getElementById('linkUrl').value.trim();
  if(!title ||!url) return showToast('❌ Fill all');
  await addDoc(collection(db, "links"), {title, url, created: Timestamp.now()});
  closeModal(); showToast('✅ Link Added');
};

window.addScrollTagModal = () => {
  showModal(`<h3>📜 Add Scroll Tag</h3>
    <label>Tag Text (Old will be replaced)</label><input id="tagText">
    <div class="flex"><button class="btn btn-green" onclick="saveScrollTag()">💾 Save</button>
    <button class="btn btn-red" onclick="closeModal()">Cancel</button></div>`);
};

window.saveScrollTag = async () => {
  const text = document.getElementById('tagText').value.trim();
  if(!text) return;
  await setDoc(doc(db, "settings", "scrollTag"), {text});
  document.querySelector('#scrollTag span').textContent = text;
  closeModal(); showToast('✅ Scroll Tag Updated');
};

async function loadScrollTag() {
  const d = await getDoc(doc(db, "settings", "scrollTag"));
  if(d.exists()) document.querySelector('#scrollTag span').textContent = d.data().text;
}

window.addNoticeModal = () => {
  showModal(`<h3>📢 Add Notice</h3>
    <label>Notice Text (Old will be replaced)</label>
    <textarea id="noticeText" rows="6"></textarea>
    <div class="flex"><button class="btn btn-green" onclick="saveNotice()">💾 Save</button>
    <button class="btn btn-red" onclick="closeModal()">Cancel</button></div>`);
};

window.saveNotice = async () => {
  const text = document.getElementById('noticeText').value.trim();
  await setDoc(doc(db, "settings", "notice"), {text});
  closeModal(); showToast('✅ Notice Updated');
};

window.addEventModal = () => {
  showModal(`<h3>📅 Add Event</h3>
    <label>Event Title</label><input id="eventTitle">
    <label>Description</label><textarea id="eventDesc" rows="4"></textarea>
    <label>Last Date</label><input id="eventDate" type="date">
    <div class="flex"><button class="btn btn-green" onclick="saveEvent()">💾 Save</button>
    <button class="btn btn-red" onclick="closeModal()">Cancel</button></div>`);
};

window.saveEvent = async () => {
  const title = document.getElementById('eventTitle').value.trim();
  const desc = document.getElementById('eventDesc').value.trim();
  const lastDate = document.getElementById('eventDate').value;
  if(!title ||!lastDate) return showToast('❌ Title & Date required');
  await addDoc(collection(db, "events"), {title, desc, lastDate, created: Timestamp.now()});
  closeModal(); showToast('✅ Event Added');
};

window.showReceivedApp = async () => {
  const snap = await getDocs(query(collection(db, "receivedApps"), orderBy("submittedAt", "desc")));
  let html = '<h3>📥 Received Applications</h3>';
  const grouped = {};
  snap.forEach(d => {
    const a = d.data();
    if(!grouped[a.formTitle]) grouped[a.formTitle] = [];
    grouped[a.formTitle].push({id: d.id,...a});
  });
  Object.keys(grouped).forEach(title => {
    html += `<div class="card"><h4>${title}</h4>`;
    grouped[title].forEach(app => {
      html += `<div style="border:1px solid #eee;padding:12px;margin:10px 0;border-radius:8px">`;
      Object.keys(app.data).forEach(k => { html += `<b>${k}:</b> ${nl2br(app.data[k])}<br>`; });
      html += `<span class="small">Submitted: ${app.submittedAt.toDate().toLocaleString()}</span><br>
      <div class="flex"><button class="btn" onclick="shareAppLink('${app.id}')">🔗 Create Share Link</button>
      <button class="btn btn-red" onclick="delDoc('receivedApps','${app.id}');showReceivedApp()">🗑️ Delete</button></div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('officeData').innerHTML = html || '<div class="card">No Applications Yet</div>';
  document.getElementById('appBadge').classList.add('hide');
};

window.shareAppLink = async (appId) => {
  const link = location.origin + location.pathname + '?viewApp=' + appId;
  await navigator.clipboard.writeText(link);
  showToast('✅ Link Copied! Valid 100 days');
};

function listenApplications() {
  onSnapshot(collection(db, "receivedApps"), (snap) => {
    const badge = document.getElementById('appBadge');
    if(snap.size > 0) { badge.textContent = snap.size; badge.classList.remove('hide'); }
    else badge.classList.add('hide');
  });
}

// URL PARAMS FOR DEEP LINK
async function checkUrlParams() {
  const p = new URLSearchParams(location.search);
  const appId = p.get('viewApp'), eventId = p.get('event');
  if(appId) {
    const d = await getDoc(doc(db, "receivedApps", appId));
    if(d.exists()) {
      const a = d.data();
      let html = `<div class="card"><h3>${a.formTitle}</h3>`;
      Object.keys(a.data).forEach(k => { html += `<b>${k}:</b> ${nl2br(a.data[k])}<br>`; });
      html += `</div>`;
      document.getElementById('mainContent').innerHTML = html;
      showTab('main', document.querySelector('.nav-btn'));
    }
  }
  if(eventId) {
    const d = await getDoc(doc(db, "events", eventId));
    if(d.exists()) {
      const e = d.data();
      document.getElementById('mainContent').innerHTML = `<div class="card"><h3>📅 ${e.title}</h3><span class="small">Last Date: ${e.lastDate}</span><br>${nl2br(e.desc)}</div>`;
      showTab('main', document.querySelector('.nav-btn'));
    }
  }
}

// LIST PAD
window.newPage = () => {
  const title = prompt('Enter page title:');
  if(title && title.trim()) {
    if(listPages[title]) return showToast('⚠️ Page already exists');
    listPages[title] = [];
    saveListPages(); renderPages();
  }
};

function renderPages() {
  let html = '';
  Object.keys(listPages).forEach(title => {
    html += `<div class="card page-card" data-title="${title.toLowerCase()}"><h4>${title}</h4>
      <div class="flex"><button class="btn" onclick="copyPage('${title}')">📋 Copy All</button>
      <button class="btn btn-red" onclick="delPage('${title}')">🗑️ Delete Page</button></div>
      <input placeholder="Type line & Press Enter..." onkeypress="if(event.key==='Enter'){addLine('${title}',this)}">
      <div id="lines_${btoa(title)}">`;
    listPages[title].forEach((line, i) => {
      html += `<div class="line-item"><span>${nl2br(line)}</span><span class="del-line" onclick="delLine('${title}',${i})">❌</span></div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('pagesContainer').innerHTML = html || '<div class="card">No Pages. Click ➕ New Page</div>';
}

window.addLine = (title, input) => {
  const line = input.value.trim();
  if(!line) return;
  if(listPages[title].includes(line)) return showToast('⚠️ আগেই উপস্থিত আছে');
  listPages[title].push(line);
  input.value = ''; saveListPages(); renderPages();
};

window.delLine = (title, i) => { listPages[title].splice(i,1); saveListPages(); renderPages(); };
window.delPage = (title) => { if(confirm('Delete entire page?')){ delete listPages[title]; saveListPages(); renderPages(); } };
window.copyPage = (title) => { navigator.clipboard.writeText(listPages[title].join('\n')); showToast('✅ Copied'); };
window.filterPages = () => {
  const q = document.getElementById('searchPage').value.toLowerCase();
  document.querySelectorAll('.page-card').forEach(c => {
    c.classList.toggle('hide',!c.dataset.title.includes(q));
  });
};
window.searchAllLines = () => {
  const q = document.getElementById('searchLine').value.toLowerCase();
  document.querySelectorAll('.line-item').forEach(item => {
    item.classList.toggle('hide',!item.textContent.toLowerCase().includes(q));
  });
};
function saveListPages() { localStorage.setItem('listPages', JSON.stringify(listPages)); }

// AUTO DELETE
async function autoDeleteExpired() {
  const now = Timestamp.now();
  const snap = await getDocs(collection(db, "receivedApps"));
  snap.forEach(async (d) => {
    if(d.data().expireAt && d.data().expireAt.toMillis() < now.toMillis()) await deleteDoc(d.ref);
  });
  const forms = await getDocs(collection(db, "appForms"));
  forms.forEach(async (d) => {
    const f = d.data();
    if(f.created && f.expiryDays) {
      const expiry = f.created.toMillis() + f.expiryDays*24*60*60*1000;
      if(Date.now() > expiry) await deleteDoc(d.ref);
    }
  });
}

// UTILS
window.delDoc = async (col, id) => { if(confirm('Delete?')){ await deleteDoc(doc(db, col, id)); showToast('✅ Deleted'); } };
window.showModal = (html) => { document.getElementById('modalContent').innerHTML = html; document.getElementById('modal').classList.remove('hide'); };
window.closeModal = () => document.getElementById('modal').classList.add('hide');
function nl2br(str) { return String(str).replace(/\n/g, '<br>'); }
function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2500);
}

// OFFLINE SERVICE WORKER
function registerSW() {
  if('serviceWorker' in navigator) {
    const sw = `const C='v4';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['/']))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    const blob = new Blob([sw], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
  }
}
